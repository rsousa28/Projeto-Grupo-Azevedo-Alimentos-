<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- 
    Brand: AZEVEDO
    Design: High-Luxury Serif Brand Emblem
    Characteristics: Mathematical bezier symmetry, stable vector curves, crisp vector geometry, didot high-contrast stems
    Aligned and cropped to remove redundant vertical padding, ensuring optimal centering and crispness across all screen sizes.
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap');
      .serif-brand-text {
        font-family: 'Playfair Display', 'Didot', 'Times New Roman', serif;
        font-size: 38px;
        font-weight: 400;
        letter-spacing: 24px;
        fill: #111111;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Elegant vector symbol A -->
  <path d="
    M 300 20 
    L 383 275 
    C 383 287, 395 300, 425 300 
    L 305 300 
    C 325 300, 345 287, 345 275 
    L 329 215 
    C 305 155, 255 155, 232 215 
    L 210 275 
    C 210 287, 218 300, 245 300 
    L 165 300 
    C 190 300, 200 287, 200 275 
    L 300 20 
    Z 
    
    M 288 65 
    L 247 175 
    C 260 145, 305 145, 318 175 
    L 288 65 
    Z
  " 
  fill="#111111" 
  fill-rule="evenodd" 
  stroke="#111111" 
  stroke-width="0.5" 
  stroke-linejoin="round"
  />

  <!-- Perfectly balanced spaced-out typography with compensating offset (dx) for trailing letter-spacing -->
  <text 
    x="300" 
    y="375" 
    dx="12"
    class="serif-brand-text"
  >AZEVEDO</text>
</svg>
